<!DOCTYPE html>

<html lang="en">
	<head>
		<link rel="stylesheet" type="text/css" href="/Style.css" />
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="/Components/Custom.js" type="text/javascript" defer></script>
		<title>Very Vilnius | Vilniaus</title>
	</head>
	<body>
		<navbar-component-pc></navbar-component-pc>
		<navbar-component-phone></navbar-component-phone>
		<language-select src="/Gatves/Vilniaus/Directions/No-parking/direction.html"></language-select>

		<div id="directions-root">
			<div class="dir-container">
				<div class="directions">
					<h1 class="dir-title">%vilniaus_directions_title%</h1>

					<div class="step">
						<div class="instruction-text">
							<p>%vilniaus_location_p_1%</p>
						</div>
						<div class="image" id="v-d-1"></div>
					</div>

					<div class="step">
						<div class="instruction-text">
							<p>%vilniaus_location_p_2%</p>
						</div>
						<div class="image" id="v-d-5"></div>
					</div>

					<div class="step">
						<div class="instruction-text">
							<p>%vilniaus_stairs_p%</p>
						</div>
						<div class="image" id="v-d-2"></div>
					</div>

					<div class="step">
						<div class="instruction-text">
							<p>%vilniaus_keybox_p%</p>
						</div>
						<div class="image" id="v-d-6"></div>
					</div>

					<div class="step">
						<div class="instruction-text">
							<p>%vilniaus_code_p%</p>
						</div>
						<div class="image" id="v-d-4"></div>
					</div>

					<div class="step">
						<div class="instruction-text">
							<p>%vilniaus_apartment_p%</p>
						</div>
						<div class="image" id="v-d-3"></div>
					</div>

					<div class="step">
						<div class="instruction-text">
							<p>%vilniaus_exit_p%</p>
						</div>
						<div class="image" id="v-d-7"></div>
					</div>
				</div>
			</div>
		</div>

		<script src="/Components/directions-i18n.js" type="text/javascript" defer></script>
	</body>
</html>
