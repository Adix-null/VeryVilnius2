<!DOCTYPE html>

<html lang="en">
	<head>
		<link rel="stylesheet" type="text/css" href="/Style.css" />
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<script src="/Components/Custom.js" type="text/javascript" defer></script>
		<title>Very Vilnius | Pilies</title>
	</head>
	<body>
		<navbar-component-pc></navbar-component-pc>
		<navbar-component-phone></navbar-component-phone>
		<language-select src="/Gatves/Pilies/Directions/No-parking/direction.html"></language-select>

		<div id="directions-root">
			<div class="dir-container">
				<div class="directions">
					<h1 class="dir-title">%pilies_directions_title%</h1>

					<div class="step">
						<h1>%pilies_location_title%</h1>
						<div class="instruction-text">
							<p>%pilies_location_p%</p>
						</div>
						<div class="image" id="p-d-1"></div>
					</div>

					<div class="step">
						<h1>%pilies_no_parking_keys_title%</h1>
						<div class="instruction-text">
							<p>%pilies_no_parking_keys_p%</p>
						</div>
						<div class="image" id="p-d-2"></div>
					</div>

					<div class="step">
						<h1>%pilies_no_parking_apartment_title%</h1>
						<div class="instruction-text">
							<p>%pilies_no_parking_apartment_p%</p>
						</div>
						<div class="image" id="p-d-4"></div>
					</div>
				</div>
			</div>
		</div>

		<script src="/Components/directions-i18n.js" type="text/javascript" defer></script>
	</body>
</html>
